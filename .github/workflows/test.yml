name: tests

# CI for the plugin's host-side Elixir surface — the same gate mob core runs,
# so a PR gets a green check instead of relying only on each contributor's
# local pre-push hook. Native code (zig/ObjC/Kotlin) is compiled by the host
# app at deploy time, not here; the FFI-seam invariants are guarded by
# source-level tests (see test/mob_camera_test.exs).

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: '1.19'
            otp: '28'
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Cache deps + _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: mix-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - run: mix deps.get
      - run: mix deps.compile
      - run: mix compile --warnings-as-errors

      - name: Format check
        run: mix format --check-formatted

      - name: Credo (strict)
        run: mix credo --strict

      - name: Tests
        run: mix test --exclude macos_only --exclude requires_zig
